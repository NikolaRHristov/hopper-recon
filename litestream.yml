# Litestream — continuous SQLite replication for /data/scans.db.
#
# Default: local file replica into the litestream-backup named volume so
# `docker compose up` works out of the box with zero credentials. For real
# DR, uncomment one of the cloud replica blocks below and supply the
# matching env vars (see .env.example or the README).
#
# Litestream reads the SQLite WAL directly from outside the engine process,
# so no engine changes are required. WAL mode is already enabled in
# engine/db.go (PRAGMA journal_mode=WAL).

dbs:
  - path: /data/scans.db
    replicas:
      - type: file
        path: /backups/scans
        retention: 168h         # 7 days of WAL history
        snapshot-interval: 24h

