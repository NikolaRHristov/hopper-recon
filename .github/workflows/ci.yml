name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine — gofmt / vet / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: engine/go.sum

      - name: gofmt (fail on diff)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would reformat:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (fail on diff)
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go mod tidy produced changes — commit them"
            exit 1
          fi

      - name: go test
        run: go test ./...

  web:
    name: web — tsc / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm install
        # `npm install` (not `npm ci`): vitest pulls in platform-specific
        # optional deps (esbuild, oxc, @emnapi/runtime) that npm only
        # records in the lock for the host that ran `npm install`. Strict
        # `npm ci` rejects the linux runner when the lock was generated on
        # macOS — same fix lives in web/Dockerfile.
        run: npm install --no-audit --no-fund

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: vitest
        run: npm test

      - name: next build
        run: npm run build
