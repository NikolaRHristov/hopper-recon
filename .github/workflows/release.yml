name: release

# On a v* tag (e.g. v0.1.0): build multi-arch images for engine + web, push
# to GHCR with semver-flavored tags, sign with cosign keyless (OIDC), and
# attach an SPDX SBOM as a build attestation. Manual dispatch is supported
# for re-running a tag without re-pushing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to (re-)build (e.g. v0.1.0)
        required: true

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless signing via Sigstore
  attestations: write   # SBOM attestations on the image

jobs:
  build:
    name: ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: engine
            context: ./engine
            image: ghcr.io/${{ github.repository_owner }}/hopper-recon
          - component: web
            context: ./web
            image: ghcr.io/${{ github.repository_owner }}/hopper-recon-web
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          # On v0.1.0 → tags: v0.1.0, v0.1, v0, latest. Plain semver, no
          # `release-` prefixes — this is a single-product repo.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
          flavor: |
            latest=auto

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: true
          sbom: true

      - uses: sigstore/cosign-installer@v3

      - name: cosign sign (keyless)
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json

      - uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-${{ matrix.component }}.spdx.json
          push-to-registry: true
